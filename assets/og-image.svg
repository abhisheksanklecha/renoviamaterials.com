<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1410"/>
      <stop offset="1" stop-color="#060D0A"/>
    </linearGradient>
    <radialGradient id="glowA" cx="78%" cy="14%" r="55%">
      <stop offset="0" stop-color="#15D6C0" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#15D6C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="10%" cy="92%" r="55%">
      <stop offset="0" stop-color="#0B6E4F" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#0B6E4F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1FA876"/>
      <stop offset="1" stop-color="#15D6C0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- logo mark -->
  <g transform="translate(90,86)">
    <path d="M21 49.05 A22 22 0 1 1 43 49.05" fill="none" stroke="#1FA876" stroke-width="5.72" stroke-linecap="round"/>
    <circle cx="43" cy="49.05" r="3.74" fill="#15D6C0"/>
    <path d="M24.3 32.64 L32 24.28 L39.7 32.64" fill="none" stroke="#EAF4EE" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="172" y="128" font-family="'Space Grotesk',Arial,sans-serif" font-size="34" font-weight="600" letter-spacing="6" fill="#EAF4EE">RENOVIA</text>

  <!-- headline -->
  <text x="90" y="300" font-family="'Space Grotesk',Arial,sans-serif" font-size="74" font-weight="600" fill="#EAF4EE">Circular materials &amp;</text>
  <text x="90" y="384" font-family="'Space Grotesk',Arial,sans-serif" font-size="74" font-weight="600" fill="url(#grad)">clean-energy systems.</text>

  <!-- subline -->
  <text x="92" y="446" font-family="'IBM Plex Mono',monospace" font-size="24" fill="#8BA499">From the recycled pellet to the power system.</text>

  <!-- product chips -->
  <g font-family="'IBM Plex Mono',monospace" font-size="20" fill="#C2D4CB">
    <g transform="translate(90,500)">
      <rect width="170" height="48" rx="24" fill="#15D6C0" fill-opacity="0.07" stroke="#15D6C0" stroke-opacity="0.32"/>
      <text x="85" y="31" text-anchor="middle">rPET · PET</text>
    </g>
    <g transform="translate(276,500)">
      <rect width="100" height="48" rx="24" fill="#15D6C0" fill-opacity="0.07" stroke="#15D6C0" stroke-opacity="0.32"/>
      <text x="50" y="31" text-anchor="middle">PLA</text>
    </g>
    <g transform="translate(392,500)">
      <rect width="250" height="48" rx="24" fill="#15D6C0" fill-opacity="0.07" stroke="#15D6C0" stroke-opacity="0.32"/>
      <text x="125" y="31" text-anchor="middle">Recycled aluminium</text>
    </g>
    <g transform="translate(658,500)">
      <rect width="270" height="48" rx="24" fill="#15D6C0" fill-opacity="0.07" stroke="#15D6C0" stroke-opacity="0.32"/>
      <text x="135" y="31" text-anchor="middle">BESS · EV · Solar</text>
    </g>
  </g>

  <!-- tagline bottom-right -->
  <text x="1110" y="566" text-anchor="end" font-family="'IBM Plex Mono',monospace" font-size="18" fill="#5F7468">Connecting Resources. Sustaining Futures.</text>
</svg>
